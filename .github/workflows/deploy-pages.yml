name: Deploy Planner AT → GitHub Pages

on:
  push:
    branches: [master]
    paths: ['planner-src/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload planner-src/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: planner-src/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
